server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    index html/home.html html/index.html index.html;

    location / {
        try_files $uri $uri/ /html/home.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|jfif|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
